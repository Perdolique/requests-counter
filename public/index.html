<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requests Counter</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif;
        line-height: 1.4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: linear-gradient(165deg, #f8fafc 0%, #e2e8f0 45%, #cbd5e1 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(165deg, #f8fafc 0%, #e2e8f0 45%, #cbd5e1 100%);
        color: #0f172a;
      }

      .page {
        margin: 0 auto;
        max-width: 720px;
        padding: 32px 20px 48px;
      }

      .card {
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 16px;
        box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
        padding: 22px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .hidden {
        display: none !important;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(1.5rem, 2.4vw, 2rem);
      }

      p {
        margin: 0;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .input-row {
        display: flex;
        gap: 8px;
      }

      .input-row input {
        flex: 1;
        min-width: 0;
      }

      .input-row button {
        white-space: nowrap;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input {
        border: 1px solid #94a3b8;
        border-radius: 10px;
        font-size: 0.98rem;
        padding: 10px 12px;
      }

      button,
      .link-button {
        appearance: none;
        border: 1px solid #0f172a;
        border-radius: 10px;
        background: #0f172a;
        color: #f8fafc;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.95rem;
        font-weight: 700;
        min-height: 40px;
        padding: 8px 16px;
        text-decoration: none;
      }

      button.secondary,
      .link-button.secondary {
        background: transparent;
        color: #0f172a;
      }

      button.danger,
      .link-button.danger {
        border-color: #7f1d1d;
        background: #7f1d1d;
        color: #fef2f2;
      }

      .hint {
        color: #334155;
        font-size: 0.93rem;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .status {
        border-radius: 10px;
        font-size: 0.92rem;
        padding: 10px 12px;
      }

      .status.error {
        background: #fee2e2;
        color: #7f1d1d;
      }

      .status.success {
        background: #dcfce7;
        color: #14532d;
      }

      .obs-link {
        display: inline-block;
        word-break: break-all;
      }

      .obs-link.masked {
        border: 1px dashed rgba(15, 23, 42, 0.35);
        border-radius: 10px;
        color: #334155;
        padding: 10px 12px;
      }

      .github-link {
        display: block;
        text-align: center;
        color: #64748b;
        font-size: 0.875rem;
        margin-top: 20px;
        transition: color 180ms ease;
      }

      .github-link:hover {
        color: #475569;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
      }

      .stat-card {
        background: rgba(241, 245, 249, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 12px;
        padding: 12px 14px;
        display: grid;
        gap: 4px;
      }

      .stat-label {
        color: #475569;
        font-size: 0.82rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      .stat-value {
        color: #0f172a;
        font-size: 1.6rem;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .model-usage-section {
        --model-usage-track-bg: rgba(148, 163, 184, 0.22);
        --model-usage-fill-start: #0f172a;
        --model-usage-fill-end: #334155;
        display: grid;
        gap: 10px;
        margin-top: 12px;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(248, 250, 252, 0.7);
      }

      .model-usage-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .model-usage-title {
        color: #475569;
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .model-usage-controls {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
      }

      .model-usage-toggle {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.55);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        color: #334155;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1;
        min-height: 28px;
        padding: 6px 10px;
        white-space: nowrap;
      }

      .model-usage-toggle.is-active {
        border-color: #0f172a;
        background: #0f172a;
        color: #f8fafc;
      }

      .model-usage-groups {
        display: grid;
        gap: 12px;
      }

      .model-usage-group {
        --model-usage-track-bg: rgba(148, 163, 184, 0.2);
        --model-usage-fill-start: #0f172a;
        --model-usage-fill-end: #334155;
        display: grid;
        gap: 10px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(255, 255, 255, 0.58);
        box-shadow: inset 3px 0 0 rgba(15, 23, 42, 0.08);
      }

      .model-usage-group-title {
        color: #334155;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(255, 255, 255, 0.72);
      }

      .model-usage-group[data-model-usage-group="regular"] {
        --model-usage-track-bg: rgba(148, 163, 184, 0.18);
        --model-usage-fill-start: #0f172a;
        --model-usage-fill-end: #334155;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.7) 0%, rgba(248, 250, 252, 0.78) 100%);
        box-shadow: inset 3px 0 0 rgba(15, 23, 42, 0.16);
      }

      .model-usage-group[data-model-usage-group="regular"] .model-usage-group-title {
        color: #1e293b;
        border-color: rgba(148, 163, 184, 0.35);
        background: rgba(255, 255, 255, 0.86);
      }

      .model-usage-group[data-model-usage-group="auto"] {
        --model-usage-track-bg: rgba(14, 116, 144, 0.13);
        --model-usage-fill-start: #0f766e;
        --model-usage-fill-end: #0369a1;
        background: linear-gradient(180deg, rgba(236, 254, 255, 0.92) 0%, rgba(224, 242, 254, 0.78) 100%);
        border-color: rgba(14, 116, 144, 0.16);
        box-shadow: inset 3px 0 0 rgba(14, 116, 144, 0.28);
      }

      .model-usage-group[data-model-usage-group="auto"] .model-usage-group-title {
        color: #0f766e;
        border-color: rgba(14, 116, 144, 0.2);
        background: rgba(236, 254, 255, 0.95);
      }

      .model-usage-group[data-model-usage-group="others"] {
        --model-usage-track-bg: rgba(217, 119, 6, 0.12);
        --model-usage-fill-start: #b45309;
        --model-usage-fill-end: #d97706;
        background: linear-gradient(180deg, rgba(255, 251, 235, 0.95) 0%, rgba(254, 243, 199, 0.62) 100%);
        border-color: rgba(217, 119, 6, 0.18);
        box-shadow: inset 3px 0 0 rgba(217, 119, 6, 0.28);
      }

      .model-usage-group[data-model-usage-group="others"] .model-usage-group-title {
        color: #92400e;
        border-color: rgba(217, 119, 6, 0.2);
        background: rgba(255, 251, 235, 0.95);
      }

      .model-usage-list {
        display: grid;
        gap: 10px;
      }

      .model-usage-item {
        display: grid;
        gap: 6px;
      }

      .model-usage-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .model-usage-label {
        color: #0f172a;
        font-weight: 700;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .model-usage-value {
        color: #334155;
        font-size: 0.92rem;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .model-usage-track {
        height: 10px;
        border-radius: 999px;
        background: var(--model-usage-track-bg);
        overflow: hidden;
      }

      .model-usage-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          var(--model-usage-fill-start) 0%,
          var(--model-usage-fill-end) 100%
        );
      }

      .save-popover {
        border: 1px solid rgba(20, 83, 45, 0.5);
        border-radius: 10px;
        background: #dcfce7;
        color: #14532d;
        font-weight: 700;
        padding: 10px 12px;
        margin: 0;
        max-width: min(280px, calc(100vw - 24px));
        pointer-events: none;
        position: fixed;
        z-index: 1000;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
      }

      @media (max-width: 680px) {
        .header {
          flex-direction: column;
        }

        .model-usage-header {
          flex-direction: column;
          align-items: stretch;
        }

        .model-usage-controls {
          justify-content: flex-start;
        }

        .model-usage-row {
          flex-direction: column;
          align-items: flex-start;
          gap: 2px;
        }

        .model-usage-value {
          white-space: normal;
        }
      }

      @keyframes loading-pulse {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 1; }
      }

      #loadingBlock {
        animation: loading-pulse 1.4s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: no-preference) {
        ::view-transition-old(root) {
          animation-duration: 0.3s;
        }

        ::view-transition-new(root) {
          animation-duration: 0.3s;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card stack">
        <div class="header" id="headerBlock">
          <div class="stack">
            <h1>Copilot Premium Requests Counter</h1>
            <p id="subtitle">Sign in with GitHub to manage your OBS widget settings.</p>
          </div>
          <div id="userActions" class="row hidden">
            <button id="logoutButton" type="button" class="secondary">Logout</button>
            <button id="deleteAccountButton" type="button" class="danger">Delete account</button>
          </div>
        </div>

        <div id="loadingBlock">
          <p class="hint">Loading...</p>
        </div>

        <div id="unauthorizedBlock" class="stack hidden">
          <a href="/api/auth/github/login" class="link-button">Login with GitHub</a>
        </div>

        <div id="authorizedBlock" class="stack hidden">
          <div id="dashboardStats" class="stack hidden">
            <p><strong>Dashboard</strong></p>
            <div id="dashboardStatsContent"></div>
          </div>

          <div id="authHealthBlock" class="stack hidden">
            <p><strong>GitHub authorization</strong></p>
            <p id="authHealthMessage" class="hint">GitHub authorization needs reconnect.</p>
            <div class="row">
              <button id="authReconnectButton" type="button" class="secondary">Reconnect GitHub</button>
            </div>
          </div>

          <div class="form-grid">
            <label>
              Monthly GitHub Copilot premium request quota
              <input id="quotaInput" type="number" min="1" step="1" placeholder="300" />
            </label>

            <label>
              OBS widget title (optional)
              <input id="obsTitleInput" type="text" maxlength="120" placeholder="Copilot premium requests available today" />
            </label>
          </div>

          <div class="stack">
            <p><strong>OBS URL</strong></p>
            <p id="obsUrl" class="obs-link masked">URL hidden for stream safety. Use Copy URL.</p>
            <div class="row">
              <button id="copyObsButton" type="button" class="secondary">Copy URL</button>
              <button id="regenerateButton" type="button" class="secondary">Regenerate</button>
            </div>
          </div>
        </div>

        <div id="statusBox" class="status hidden"></div>
      </section>

      <a href="https://github.com/Perdolique/requests-counter" target="_blank" rel="noopener noreferrer" class="github-link">GitHub</a>
    </main>

    <div id="savePopover" class="save-popover" popover="manual"></div>

    <script type="module" src="/index.js"></script>
  </body>
</html>
